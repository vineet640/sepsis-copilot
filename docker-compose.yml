# Local production-like stack: API + static UI
# Usage:
#   cp backend/.env.example backend/.env   # add keys
#   docker compose up --build
# Open http://localhost:8080 — UI calls API at http://localhost:8000 (set in build arg below)

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      PORT: "8000"
      # Allow browser on :8080 and local Vite dev
      CORS_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173"

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - api
